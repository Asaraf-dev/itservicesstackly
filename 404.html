<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Page Not Found</title>


    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/404.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- PNG favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">

    <!-- Apple -->
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">

    <!-- Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/android-chrome-512x512.png">

    <!-- Manifest -->
    <link rel="manifest" href="assets/images/site.webmanifest">

</head>

<body>

    <section class="error404-section">

        <!--- Background Glow --->

        <div class="error404-glow error404-glow-left"></div>
        <div class="error404-glow error404-glow-right"></div>

        <!--- Background Grid --->

        <div class="error404-grid"></div>

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-xl-10">

                    <div class="error404-card">

                        <div class="row align-items-center">

                            <!--- Content --->

                            <div class="col-lg-6">

                                <div class="error404-content">

                                    <span class="error404-badge">

                                        <i class="bi bi-exclamation-circle-fill"></i>

                                        ERROR 404

                                    </span>

                                    <h1 class="error404-title">

                                        4<span><i class="bi bi-power"></i></span>4

                                    </h1>

                                    <h2 class="error404-heading">

                                        Lost In Cyberspace

                                    </h2>

                                    <p class="error404-text">

                                        The page you're looking for might have been removed,
                                        renamed or is temporarily unavailable.
                                        Let's help you find your way back.

                                    </p>

                                    <!--- Buttons --->

                                    <div class="error404-buttons">

                                        <a href="index.html" class="btn error404-btn">

                                            <i class="bi bi-house-door-fill"></i>

                                            Back Home

                                        </a>

                                        <button type="button" id="goBackBtn"
                                            class="btn error404-btn error404-btn-secondary">

                                            <i class="bi bi-arrow-left-circle-fill"></i>

                                            Go Back

                                        </button>

                                    </div>

                                </div>

                            </div>

                            <!--- Image --->

                            <div class="col-lg-6">

                                <div class="error404-image">

                                    <div class="error404-circle"></div>

                                    <img src="assets/images/error.svg" class="img-fluid error404-workspace"
                                        alt="Workspace">

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="assets/js/404.js"></script>

</body>

</html>
