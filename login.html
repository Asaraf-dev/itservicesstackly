<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- PNG favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">

    <!-- Apple -->
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">

    <!-- Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/images/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/images/android-chrome-512x512.png">

    <!-- Manifest -->
    <link rel="manifest" href="assets/images/site.webmanifest">

    <!--- Icon Code --->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="assets/css/auth.css">

    <link rel="stylesheet" href="assets/css/loader.css">

</head>

<body>

    <!--- Login Section --->

    <section class="login-section">

        <div class="container-fluid">

            <div class="row g-0 min-vh-100 align-items-center justify-content-center">

                <!--- Login Card --->

                <div class="col-12 col-lg-5 col-xl-4">

                    <div class="login-card">

                        <!--- Logo --->

                        <div class="login-logo">

                            <a href="index.html"><img src="assets/images/barnd-logo.webp" alt="Logo"></a>

                        </div>

                        <!--- Header --->

                        <div class="login-header">

                            <span class="login-badge">

                                <i class="bi bi-shield-lock-fill"></i>

                                Secure Login

                            </span>

                            <h1 class="login-title">

                                Welcome Back

                            </h1>

                            <p class="login-description">

                                Sign in to securely access your dashboard and manage your account.

                            </p>

                        </div>

                        <!--- Role Switch --->

                        <div class="login-role-switch">

                            <input type="radio" class="btn-check" name="loginRole" id="clientRole" checked>

                            <label class="login-role-btn" for="clientRole">

                                <i class="bi bi-person-fill"></i>

                                <span>Client</span>

                            </label>

                            <input type="radio" class="btn-check" name="loginRole" id="adminRole">

                            <label class="login-role-btn" for="adminRole">

                                <i class="bi bi-shield-lock-fill"></i>

                                <span>Admin</span>

                            </label>

                            <div class="login-role-slider"></div>

                        </div>

                        <!--- Login Form --->

                        <form class="login-form">

                            <!--- Username --->

                            <div class="login-input-group">

                                <label>

                                    Email

                                </label>

                                <div class="login-input-wrapper">

                                    <i class="bi bi-person"></i>

                                    <input type="email" class="form-control" placeholder="Enter your Email" required>

                                </div>

                            </div>

                            <!--- Password --->

                            <div class="login-input-group">

                                <label>

                                    Password

                                </label>

                                <div class="login-input-wrapper">

                                    <i class="bi bi-lock"></i>

                                    <input type="password" id="loginPassword" class="form-control"
                                        placeholder="Enter your password" required>

                                    <button type="button" class="login-password-toggle">

                                        <i class="bi bi-eye"></i>

                                    </button>

                                </div>

                            </div>

                            <!--- Options --->

                            <div class="login-options">

                                <div class="form-check">

                                    <input class="form-check-input" type="checkbox" id="rememberMe">

                                    <label class="form-check-label" for="rememberMe">

                                        Remember Me

                                    </label>

                                </div>

                            </div>

                            <!--- Login Button --->

                            <button type="submit" class="login-btn">

                                <i class="bi bi-box-arrow-in-right"></i>

                                Login

                            </button>

                        </form>

                        <!--- Login Links --->

                        <div class="login-links">

                            <a href="404.html" class="login-forgot">

                                Forgot Password?

                            </a>

                            <p>

                                Don't have an account?

                                <a href="register.html">

                                    Sign Up

                                </a>

                            </p>

                        </div>

                        <!--- Footer --->

                        <div class="login-footer">

                            © 2026 The Stackly. All Rights Reserved.

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!--- Login Section End --->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>

</body>

</html>
